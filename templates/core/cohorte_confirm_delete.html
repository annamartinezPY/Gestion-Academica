{% extends 'base.html' %}

{% block title %}Eliminar Cohorte{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <i class="bi bi-exclamation-triangle me-2"></i>Confirmar Eliminacion
            </div>
            <div class="card-body text-center py-4">
                <i class="bi bi-calendar-x text-danger" style="font-size: 4rem;"></i>
                <h5 class="mt-3">Estas seguro de eliminar esta cohorte?</h5>
                <p class="text-muted"><strong>{{ cohorte.codigo }}</strong><br>{{ cohorte.curso.nombre }}</p>
            </div>
            <div class="card-footer">
                <form method="post" class="d-flex justify-content-center gap-2">
                    {% csrf_token %}
                    <a href="{% url 'cohorte_detail' cohorte.pk %}" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-2"></i>Eliminar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
